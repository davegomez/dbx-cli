name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Read release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5 --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --package dbx-cli --bin dbx --target ${{ matrix.target }}
          else
            cargo build --release --locked --package dbx-cli --bin dbx --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARTIFACT="dbx-cli-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/dbx" staging/
          cp LICENSE README.md CHANGELOG.md staging/
          tar czf "${ARTIFACT}.tar.gz" -C staging .
          shasum -a 256 "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
        shell: bash

      - name: Package archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          $Artifact = "dbx-cli-${{ matrix.target }}"
          New-Item -ItemType Directory -Path staging
          Copy-Item "target/${{ matrix.target }}/release/dbx.exe" staging/
          Copy-Item LICENSE, README.md, CHANGELOG.md staging/
          Compress-Archive -Path "staging/*" -DestinationPath "$Artifact.zip"
          (Get-FileHash "$Artifact.zip" -Algorithm SHA256).Hash.ToLower() + "  $Artifact.zip" | Out-File -Encoding ascii "$Artifact.zip.sha256"
        shell: pwsh

      - name: Attest build provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dbx-cli-${{ matrix.target }}.${{ matrix.archive }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            dbx-cli-${{ matrix.target }}.${{ matrix.archive }}
            dbx-cli-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    needs:
      - plan
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ needs.plan.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > release-notes.md <<'EOF'
          ## Installation

          Download the archive and matching `.sha256` file for your OS and CPU from the assets below.

          ### npm

          ```bash
          npm install -g @silky/dbx-cli
          ```

          ### Cargo

          ```bash
          cargo install dbx-cli
          ```

          ### Linux

          Choose one of these targets:

          - `x86_64-unknown-linux-gnu`
          - `x86_64-unknown-linux-musl`
          - `aarch64-unknown-linux-gnu`
          - `aarch64-unknown-linux-musl`

          ```bash
          target="x86_64-unknown-linux-gnu"
          curl -sSLO "https://github.com/davegomez/dbx-cli/releases/download/${{ github.ref_name }}/dbx-cli-${target}.tar.gz"
          curl -sSLO "https://github.com/davegomez/dbx-cli/releases/download/${{ github.ref_name }}/dbx-cli-${target}.tar.gz.sha256"
          shasum -a 256 -c "dbx-cli-${target}.tar.gz.sha256"
          tar -xzf "dbx-cli-${target}.tar.gz"
          chmod +x dbx
          sudo mv dbx /usr/local/bin/
          dbx --help
          ```

          ### macOS

          Choose one of these targets:

          - `aarch64-apple-darwin` for Apple Silicon
          - `x86_64-apple-darwin` for Intel

          ```bash
          target="aarch64-apple-darwin"
          curl -sSLO "https://github.com/davegomez/dbx-cli/releases/download/${{ github.ref_name }}/dbx-cli-${target}.tar.gz"
          curl -sSLO "https://github.com/davegomez/dbx-cli/releases/download/${{ github.ref_name }}/dbx-cli-${target}.tar.gz.sha256"
          shasum -a 256 -c "dbx-cli-${target}.tar.gz.sha256"
          tar -xzf "dbx-cli-${target}.tar.gz"
          chmod +x dbx
          sudo mv dbx /usr/local/bin/
          dbx --help
          ```

          ### Windows

          1. Download `dbx-cli-x86_64-pc-windows-msvc.zip` and `dbx-cli-x86_64-pc-windows-msvc.zip.sha256`.
          2. Verify checksum in PowerShell:

             ```powershell
             $hash = (Get-FileHash dbx-cli-x86_64-pc-windows-msvc.zip -Algorithm SHA256).Hash.ToLower()
             $expected = (Get-Content dbx-cli-x86_64-pc-windows-msvc.zip.sha256).Split()[0]
             if ($hash -ne $expected) { throw "Checksum mismatch" }
             ```

          3. Extract zip.
          4. Move `dbx.exe` to a directory on your `PATH`.
          5. Run `dbx --help`.

          ---
          EOF

          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists; refreshing metadata and assets."
            gh release edit "${{ github.ref_name }}" \
              --target "${{ github.sha }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG
            gh release upload "${{ github.ref_name }}" --clobber artifacts/*
          else
            gh release create "${{ github.ref_name }}" \
              --target "${{ github.sha }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --generate-notes \
              $PRERELEASE_FLAG \
              artifacts/*
          fi

  publish-crates:
    needs:
      - plan
      - release
    if: needs.plan.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        run: |
          VERSION="${{ needs.plan.outputs.version }}"

          crate_exists() {
            cargo info "$1@${VERSION}" --registry crates-io >/dev/null 2>&1
          }

          wait_for_crate() {
            crate="$1"
            for attempt in {1..60}; do
              if crate_exists "$crate"; then
                return 0
              fi
              echo "Waiting for ${crate} ${VERSION} in crates.io index (attempt ${attempt}/60)"
              sleep 10
            done
            echo "${crate} ${VERSION} did not appear in crates.io index in time" >&2
            return 1
          }

          if crate_exists dbx-cli-core; then
            echo "dbx-cli-core ${VERSION} already exists, skipping publish."
          else
            cargo publish --dry-run --locked --package dbx-cli-core
            cargo publish --locked --package dbx-cli-core
          fi

          wait_for_crate dbx-cli-core

          if crate_exists dbx-cli; then
            echo "dbx-cli ${VERSION} already exists, skipping publish."
          else
            cargo publish --dry-run --locked --package dbx-cli
            cargo publish --locked --package dbx-cli
          fi

  publish-npm:
    needs:
      - plan
      - release
    if: needs.plan.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm package contents
        run: npm pack ./npm --dry-run

      - name: Publish npm package
        working-directory: npm
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME} ${VERSION} already exists on npm, skipping publish."
          else
            npm publish --access public --provenance
          fi
