name: Audit

on:
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/*/Cargo.toml
      - deny.toml
      - .github/workflows/audit.yml
  push:
    branches:
      - develop
    paths:
      - Cargo.lock
      - Cargo.toml
      - crates/*/Cargo.toml
      - deny.toml
      - .github/workflows/audit.yml
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run vulnerability audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run dependency policy checks
        run: cargo deny check
